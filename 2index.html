<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>나의 첫 웹페이지</title>
<style>
    body {
      background-color: #e0ffe0;
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
    }
    h1 {
      color: #6b3fa0;
    }
    button {
      background-color: #6b3fa0;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 20px;
    }
  </style>
</head>
<body>

  <h1>안녕하세요, 저는 홍길동입니다</h1>

  <p>오늘은 수요일!</p>

  <img src="https://search.pstatic.net/common/?src=http%3A%2F%2Fblogfiles.naver.net%2FMjAyMjA3MjhfMTUz%2FMDAxNjU4OTk0MzY4MTIz.ouUcj5bZLBd8vTLso6IvHWe6RzwWu3XkSztCCxufXu4g.v61GerYuMuxchQj61x6_cTipQiKGXVIa_3R_mOFJYOog.JPEG.crowdpic%2F%25C0%25E5%25C8%25AD%25BD%25C5%25C0%25BA%25B0%25ED%25BE%25E7%25C0%25CC_%25BB%25E7%25C1%25F8.jpg&type=sc960_832" alt="귀여운 고양이">

 <button onclick="kkkk()">눌러라</button>
 
  <hr>
 
  <h2 id="counterDisplay">2번 눌렀어요</h2>
  <button onclick="addCount()">카운트 올리기</button>

  <button onclick="reset()">리셋</button>


  <script>
    function kkkk() {
      alert("안녕하세요! 버튼이 눌렸어요 🎉");
    }


    let roso = 2;
 
    function addCount() {
      roso = roso * 2;
      document.getElementById("counterDisplay").textContent = roso + "번 눌렀어요";
    }

    function reset() {
      roso = 2;
      document.getElementById("counterDisplay").textContent =  roso + "번 눌렀어요";
    }

  </script>

</body>
</html>
