<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거울과 렌즈의 상 시뮬레이션</title>
<style>
  :root{
    --blue-50:#eef4ff;
    --blue-100:#dce8ff;
    --blue-300:#9fbdf5;
    --blue-500:#3f6fd8;
    --blue-700:#1f3f8f;
    --ink:#16213a;
    --gray:#6b7280;
    --card-border:#c9d8f5;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#f6f9ff;
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    color:var(--ink);
    padding:24px;
  }
  .app{max-width:900px;margin:0 auto;}
  .card{
    background:#fff;
    border:1.5px solid var(--card-border);
    border-radius:16px;
    padding:18px 20px;
    margin-bottom:16px;
  }
  .card h3{
    margin:0 0 14px 0;
    font-size:16px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .check{
    width:20px;height:20px;border-radius:50%;
    background:var(--blue-500);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;flex-shrink:0;
  }
  .sub{font-weight:400;color:var(--gray);font-size:13px;}

  .device-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .device-btn{
    background:var(--blue-50);
    border:2px solid transparent;
    border-radius:12px;
    padding:14px 8px;
    display:flex;flex-direction:column;align-items:center;gap:8px;
    cursor:pointer;font-size:13px;font-weight:600;color:var(--blue-700);
    transition:all .15s;
  }
  .device-btn:hover{background:var(--blue-100);}
  .device-btn.active{border-color:var(--blue-500);background:var(--blue-100);box-shadow:0 0 0 3px rgba(63,111,216,.15);}
  .device-btn svg{width:34px;height:34px;}

  .status-line{
    display:flex;align-items:center;gap:6px;
    font-size:14px;color:var(--gray);margin-bottom:10px;
  }
  .status-line b{color:var(--blue-700);}

  .diagram-wrap{
    background:#fbfcff;
    border:1px solid var(--card-border);
    border-radius:14px;
    padding:10px;
    margin-bottom:14px;
  }

  .pos-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px;}
  .pos-btn{
    background:var(--blue-50);
    border:2px solid transparent;
    border-radius:12px;
    padding:16px 10px;
    text-align:center;
    cursor:pointer;
    transition:all .15s;
  }
  .pos-btn:hover{background:var(--blue-100);}
  .pos-btn.active{border-color:var(--blue-500);background:var(--blue-100);box-shadow:0 0 0 3px rgba(63,111,216,.15);}
  .pos-btn .letter{font-size:20px;font-weight:700;color:var(--blue-700);}
  .pos-btn .desc{font-size:12px;color:var(--gray);margin-top:2px;}

  .result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .result-item{
    background:var(--blue-50);border-radius:12px;padding:12px;text-align:center;
  }
  .result-item .label{font-size:11px;color:var(--gray);margin-bottom:4px;}
  .result-item .value{font-size:16px;font-weight:700;color:var(--blue-700);}

  .note{
    font-size:12.5px;color:var(--gray);line-height:1.6;
    background:var(--blue-50);border-radius:10px;padding:12px 14px;
  }
  .note b{color:var(--blue-700);}
</style>
</head>
<body>
<div class="app">

  <div class="card">
    <h3><span class="check">✓</span> 기구(거울 또는 렌즈) 선택 <span class="sub">(하나를 선택하세요)</span></h3>
    <div class="device-row" id="deviceRow"></div>
  </div>

  <div class="card">
    <div class="status-line">📍 현재 물체 위치 : <b id="statusPos">A</b></div>
    <div class="diagram-wrap">
      <svg id="diagram" viewBox="0 0 860 340" style="width:100%;height:auto;"></svg>
    </div>
    <div class="pos-row" id="posRow"></div>
  </div>

  <div class="card">
    <h3><span class="check">✓</span> 상의 특징</h3>
    <div class="result-grid">
      <div class="result-item"><div class="label">상의 종류</div><div class="value" id="rReal">-</div></div>
      <div class="result-item"><div class="label">상의 방향</div><div class="value" id="rUpright">-</div></div>
      <div class="result-item"><div class="label">상의 크기</div><div class="value" id="rSize">-</div></div>
    </div>
  </div>

  <div class="card">
    <div class="note">
      ※ <b>F</b>는 제시된 거울과 렌즈 중 일부에서 물체를 이동시킬 때, 상의 모습이 바로 선 상에서 거꾸로 선 상으로,
      또는 거꾸로 선 상에서 바로 선 상으로 바뀌는 지점입니다.
    </div>
  </div>

</div>

<script>
// ---------- 데이터 정의 ----------
var devices = {
  concaveMirror: {label:"오목거울", kind:"mirror", converging:true},
  concaveLens:   {label:"오목렌즈", kind:"lens",   converging:false},
  convexMirror:  {label:"볼록거울", kind:"mirror", converging:false},
  convexLens:    {label:"볼록렌즈", kind:"lens",   converging:true}
};
var deviceOrder = ["concaveMirror","concaveLens","convexMirror","convexLens"];

var positions = {
  A:{label:"가까이", desc:"(초점 안쪽)"},
  B:{label:"멀리", desc:"(초점과 2F 사이)"},
  C:{label:"아주멀리", desc:"(2F 바깥)"}
};
var positionOrder = ["C","B","A"]; // 화면 표시 순서: 먼 것부터

// 표준 상 특성 규칙표 (중등 과학 교육과정 기준)
function getResult(deviceKey, posKey){
  var d = devices[deviceKey];
  if(!d.converging){
    // 볼록거울, 오목렌즈: 항상 허상 / 정립 / 축소
    return {real:false, upright:true, size:"축소"};
  }
  // 수렴형(오목거울, 볼록렌즈)
  if(posKey === "A") return {real:false, upright:true, size:"확대"};
  if(posKey === "B") return {real:true, upright:false, size:"확대"};
  return {real:true, upright:false, size:"축소"}; // C
}

var currentDevice = "concaveMirror";
var currentPos = "A";

// ---------- 아이콘 (버튼용, 작은 SVG) ----------
function deviceIcon(key){
  var s = {
    concaveMirror: '<path d="M12 4 C 20 12 20 22 12 30" stroke="#3f6fd8" stroke-width="2.5" fill="none" stroke-linecap="round"/>',
    concaveLens: '<path d="M11 4 C 15 12 15 22 11 30 M23 4 C 19 12 19 22 23 30" stroke="#3f6fd8" stroke-width="2.5" fill="none" stroke-linecap="round"/>',
    convexMirror: '<path d="M22 4 C 14 12 14 22 22 30" stroke="#3f6fd8" stroke-width="2.5" fill="none" stroke-linecap="round"/>',
    convexLens: '<path d="M17 4 C 9 12 9 22 17 30 C 25 22 25 12 17 4 Z" fill="#bcd2f7" stroke="#3f6fd8" stroke-width="2"/>'
  };
  return '<svg viewBox="0 0 34 34">'+s[key]+'</svg>';
}

// ---------- UI 빌드 ----------
var deviceRow = document.getElementById('deviceRow');
deviceOrder.forEach(function(key){
  var btn = document.createElement('div');
  btn.className = 'device-btn' + (key===currentDevice ? ' active':'');
  btn.dataset.key = key;
  btn.innerHTML = deviceIcon(key) + '<span>' + devices[key].label + '</span>';
  btn.addEventListener('click', function(){
    currentDevice = key;
    refreshAll();
  });
  deviceRow.appendChild(btn);
});

var posRow = document.getElementById('posRow');
positionOrder.forEach(function(key){
  var btn = document.createElement('div');
  btn.className = 'pos-btn' + (key===currentPos ? ' active':'');
  btn.dataset.key = key;
  btn.innerHTML = '<div class="letter">'+key+'</div><div class="desc">('+positions[key].label+')</div>';
  btn.addEventListener('click', function(){
    currentPos = key;
    refreshAll();
  });
  posRow.appendChild(btn);
});

// ---------- 다이어그램 그리기 ----------
var svgNS = "http://www.w3.org/2000/svg";
function el(tag, attrs){
  var e = document.createElementNS(svgNS, tag);
  for(var k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

// x 좌표 배치
var AXIS_Y = 170;
var DEVICE_X = 560;
var POS_X = {C:150, B:300, A:450};
var F_X = 385; // A와 B 사이, A쪽에 가깝게

function drawDiagram(){
  var svg = document.getElementById('diagram');
  svg.innerHTML = "";

  // 축
  svg.appendChild(el('line',{x1:40,y1:AXIS_Y,x2:820,y2:AXIS_Y,stroke:"#a9bfe8","stroke-width":1.5,"stroke-dasharray":"6 5"}));

  // 눈 (관찰자) - 왼쪽
  var eyeL = el('text',{x:40,y:AXIS_Y+6,'font-size':22}); eyeL.textContent="👁"; svg.appendChild(eyeL);
  var lblL = el('text',{x:20,y:AXIS_Y-40,'font-size':12,fill:"#6b7280"}); lblL.textContent="거울 관찰자"; svg.appendChild(lblL);

  var eyeR = el('text',{x:790,y:AXIS_Y+6,'font-size':22}); eyeR.textContent="👁"; svg.appendChild(eyeR);
  var lblR = el('text',{x:762,y:AXIS_Y-40,'font-size':12,fill:"#6b7280"}); lblR.textContent="렌즈 관찰자"; svg.appendChild(lblR);

  // F 지점
  svg.appendChild(el('circle',{cx:F_X,cy:AXIS_Y,r:4,fill:"#e0554f"}));
  var fLbl = el('text',{x:F_X-5,y:AXIS_Y+22,'font-size':14,'font-weight':700,fill:"#e0554f"}); fLbl.textContent="F"; svg.appendChild(fLbl);

  // 물체 (항상 화살표, 위쪽으로)
  var ox = POS_X[currentPos];
  svg.appendChild(el('line',{x1:ox,y1:AXIS_Y,x2:ox,y2:AXIS_Y-90,stroke:"#1f3f8f","stroke-width":3}));
  svg.appendChild(el('path',{d:"M "+ox+" "+(AXIS_Y-90)+" l -7 12 l 14 0 z",fill:"#1f3f8f"}));
  var oLbl = el('text',{x:ox-10,y:AXIS_Y-100,'font-size':12,fill:"#1f3f8f"}); oLbl.textContent="물체"; svg.appendChild(oLbl);

  // 기구 (거울/렌즈) 모양
  var d = devices[currentDevice];
  var shape;
  if(d.kind === "mirror"){
    var curve = d.converging ? "M "+DEVICE_X+" 40 C "+(DEVICE_X-55)+" 105 "+(DEVICE_X-55)+" 235 "+DEVICE_X+" 300"
                              : "M "+DEVICE_X+" 40 C "+(DEVICE_X+55)+" 105 "+(DEVICE_X+55)+" 235 "+DEVICE_X+" 300";
    shape = el('path',{d:curve, stroke:"#3f6fd8","stroke-width":5, fill:"none","stroke-linecap":"round"});
  } else {
    var w = d.converging ? 34 : 18;
    var lensPath = d.converging
      ? "M "+(DEVICE_X)+" 40 C "+(DEVICE_X-w)+" 105 "+(DEVICE_X-w)+" 235 "+DEVICE_X+" 300 C "+(DEVICE_X+w)+" 235 "+(DEVICE_X+w)+" 105 "+DEVICE_X+" 40 Z"
      : "M "+(DEVICE_X-14)+" 40 C "+(DEVICE_X+w)+" 105 "+(DEVICE_X+w)+" 235 "+(DEVICE_X-14)+" 300 M "+(DEVICE_X+14)+" 40 C "+(DEVICE_X-w)+" 105 "+(DEVICE_X-w)+" 235 "+(DEVICE_X+14)+" 300";
    shape = el('path',{d:lensPath, stroke:"#3f6fd8","stroke-width": d.converging?2:4, fill: d.converging?"#dce8ff":"none","stroke-linecap":"round"});
  }
  svg.appendChild(shape);
  var devLbl = el('text',{x:DEVICE_X-24,y:325,'font-size':12,fill:"#1f3f8f",'font-weight':600}); devLbl.textContent=d.label; svg.appendChild(devLbl);

  // 상(이미지) 그리기
  var res = getResult(currentDevice, currentPos);
  var imgX, imgH, dashed = !res.real;
  var baseH = 90;
  var sizeMul = res.size === "확대" ? 1.5 : (res.size === "축소" ? 0.55 : 1);
  imgH = baseH * sizeMul;

  if(d.kind === "mirror"){
    if(res.real){
      // 거울 앞쪽(물체와 같은 쪽), 위치는 상황별로 대략 배치
      imgX = currentPos === "B" ? POS_X.C - 40 : (POS_X.B + POS_X.C)/2;
    } else {
      // 거울 뒤쪽 (허상)
      imgX = DEVICE_X + 90;
    }
  } else {
    if(res.real){
      // 렌즈 반대쪽(오른쪽)
      imgX = currentPos === "B" ? DEVICE_X + 150 : DEVICE_X + 70;
    } else {
      // 렌즈 같은 쪽(왼쪽), 물체보다 살짝 크게 바깥쪽으로
      imgX = ox - 60;
    }
  }

  var dir = res.upright ? -1 : 1; // -1 위로, 1 아래로
  var y2 = AXIS_Y + dir*imgH;
  var color = res.real ? "#c2483f" : "#8a5fd6";
  var lineEl = el('line',{x1:imgX,y1:AXIS_Y,x2:imgX,y2:y2,stroke:color,"stroke-width":3});
  if(dashed) lineEl.setAttribute("stroke-dasharray","6 5");
  svg.appendChild(lineEl);
  var arrowDir = dir < 0 ? -1 : 1;
  svg.appendChild(el('path',{d:"M "+imgX+" "+y2+" l -7 "+(-7*arrowDir)+" l 14 0 z", fill:color}));
  var iLbl = el('text',{x:imgX-6,y: y2 - (dir<0?10:-20),'font-size':12,fill:color,'font-weight':600}); iLbl.textContent="상"; svg.appendChild(iLbl);
}

function refreshAll(){
  document.querySelectorAll('.device-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.key === currentDevice);
  });
  document.querySelectorAll('.pos-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.key === currentPos);
  });
  document.getElementById('statusPos').textContent = currentPos;

  var res = getResult(currentDevice, currentPos);
  document.getElementById('rReal').textContent = res.real ? "실상" : "허상";
  document.getElementById('rUpright').textContent = res.upright ? "정립" : "도립";
  document.getElementById('rSize').textContent = res.size;

  drawDiagram();
}

refreshAll();
</script>
</body>
</html>
